server:
  port: 8080

spring:
  application:
    name: language-exchange-platform
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/language_exchange_platform?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: language_exchange
    password: change_me
    driver-class-name: com.mysql.cj.jdbc.Driver
  mail:
    host: smtp.example.com
    port: 587
    username: no-reply@example.com
    password: change_me
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  sql:
    init:
      mode: always
      encoding: UTF-8

app:
  demo-mode: false
  cors-allowed-origin-patterns: http://your-domain.com,http://www.your-domain.com,http://your-server-ip
  upload-root: /www/wwwroot/language-exchange-backend/uploads
  mail:
    from: no-reply@example.com
